name: Evaluate Sonic Policy

on:
  pull_request:
    branches: [ master ]
    paths:
      - 'benchmark_policies.py'
      - 'core/**'
      - 'emulator/**'
      - 'llm/**'
      - 'main.py'
      - 'tests/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/**'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        # The suite stubs the emulator, so the heavy gym-retro backend is not
        # required here -- requirements-dev.txt is the minimal test/lint set.
        pip install -r requirements-dev.txt

    - name: Lint
      run: |
        ruff check .

    - name: Run unit tests
      run: |
        python -m unittest discover -s tests -v

    - name: Compile sources
      run: |
        python -m compileall main.py core emulator llm benchmark_policies.py local_ci.py dashboard.py render_video.py
