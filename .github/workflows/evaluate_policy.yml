name: Evaluate Sonic Policy

on:
  pull_request:
    branches: [ master ]
    paths:
      - 'benchmark_policies.py'
      - 'core/**'
      - 'emulator/**'
      - 'llm/**'
      - 'main.py'
      - 'tests/**'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run unit tests
      run: |
        python -m unittest discover -v

    - name: Compile sources
      run: |
        python -m compileall main.py core emulator llm benchmark_policies.py local_ci.py dashboard.py render_video.py
