name: Evaluate Sonic Policy

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'policies/current_policy.py'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Set up virtual display (Xvfb)
      # Required for stable-retro to run headlessly on Ubuntu
      run: |
        sudo apt-get install xvfb
        sudo Xvfb :99 -ac &
        echo "DISPLAY=:99" >> $GITHUB_ENV

    # In a real scenario, you'd need a secure way to inject the ROM here.
    # We omit it here since ROMs cannot be distributed.
    - name: Run CI Simulator
      run: |
        python local_ci.py
